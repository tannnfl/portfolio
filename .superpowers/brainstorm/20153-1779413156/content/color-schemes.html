<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Color Schemes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #f0f0f0; padding: 1.5rem; }
h1 { font-size: 1.1rem; margin-bottom: 0.3rem; color: #fff; }
.meta { font-size: 0.75rem; color: #888; margin-bottom: 1.5rem; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}

.scheme {
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s, transform .1s;
}
.scheme:hover { transform: translateY(-2px); }
.scheme.selected { border-color: #0071e3; }

.scheme-preview {
  padding: 0.6rem 0.75rem 0.4rem;
}

/* Nav preview */
.p-nav {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 0.35rem;
  margin-bottom: 0.3rem;
}
.p-name { font-weight: 900; font-size: 0.85rem; font-family: Impact, sans-serif; letter-spacing: .02em; }
.p-links { display: flex; gap: 0.4rem; font-size: 0.38rem; text-transform: uppercase; letter-spacing: .08em; }
.p-link { opacity: 0.6; }

/* Filter preview */
.p-filter {
  display: flex;
  gap: 0;
  border-bottom-width: 1px;
  border-bottom-style: solid;
  margin-bottom: 0.5rem;
  padding-bottom: 0.1rem;
}
.p-fbtn {
  font-size: 0.33rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  padding: 0.2rem 0.35rem 0.2rem 0;
  opacity: 0.5;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
}
.p-fbtn.active { opacity: 1; border-bottom-width: 1.5px; border-bottom-style: solid; }

/* Card preview */
.p-card {
  border-width: 1.5px;
  border-style: solid;
  padding: 0.4rem 0.5rem;
}
.p-card-num { font-size: 0.3rem; font-weight: 700; text-transform: uppercase; letter-spacing: .15em; margin-bottom: 0.1rem; }
.p-card-title { font-size: 0.65rem; font-weight: 900; font-family: Impact, sans-serif; text-transform: uppercase; line-height: 1; }
.p-card-desc { font-size: 0.28rem; margin-top: 0.15rem; opacity: 0.6; font-style: italic; }
.p-card-tag { display: inline-block; font-size: 0.28rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; padding: 0.08rem 0.25rem; margin-top: 0.2rem; border-width: 1px; border-style: solid; }

/* Label */
.scheme-label {
  padding: 0.5rem 0.75rem;
  font-size: 0.7rem;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.scheme-num { font-size: 0.6rem; opacity: 0.6; }

/* Swatches */
.swatches { display: flex; gap: 2px; padding: 0.3rem 0.75rem 0.5rem; }
.swatch { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.15); }

/* Selection bar */
.sel-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0071e3;
  padding: 0.75rem 1.5rem;
  display: none;
  align-items: center;
  justify-content: space-between;
  font-size: 0.85rem;
  z-index: 100;
}
.sel-bar.show { display: flex; }
.sel-bar button {
  background: white; color: #0071e3; border: none; border-radius: 6px;
  padding: 0.4rem 1rem; font-weight: 700; font-size: 0.82rem; cursor: pointer;
}

</style>
</head>
<body>

<h1>20 个配色方案</h1>
<p class="meta">点击选中你喜欢的（可多选），然后在终端告诉我 · 参考你的图 + 额外研究</p>

<div class="grid" id="grid"></div>

<div class="sel-bar" id="selbar">
  <span id="seltext">已选: 无</span>
  <button onclick="confirm()">告诉我选了哪些</button>
</div>

<script>
const schemes = [
  {
    name: "Studio Dogu 石灰",

    bg: "#F5F5F0", ink: "#0D0D0D", accent: "#B8D900", accent2: "#0D0D0D",
    tan: "#C8C8C8", mid: "#666666", paper: "#FFFFFF", stripe: "#EBEBEB",
    filterBg: "#F5F5F0"
  },
  {
    name: "Y2K 蓝灰网",
    note: "参考图2 · humanfinny早期web风格",
    bg: "#E8EDF5", ink: "#1A2B4A", accent: "#4A7FCC", accent2: "#5B8A4A",
    tan: "#B0C4DC", mid: "#5A6A80", paper: "#F2F5FA", stripe: "#D5DFF0",
    filterBg: "#E8EDF5"
  },
  {
    name: "活版红",
    note: "参考图3 · 灰底红+蓝 risograph",
    bg: "#EEECEA", ink: "#1A1A18", accent: "#C4364A", accent2: "#2A6B8A",
    tan: "#C0B8A8", mid: "#706860", paper: "#F8F7F2", stripe: "#E0DDD5",

  },
  {
    name: "Juicy 奶油",
    note: "参考图4 · 奶油底+大红橙",
    bg: "#FFF0E8", ink: "#1A0A00", accent: "#E83A1A", accent2: "#8A3010",
    tan: "#F0C0A8", mid: "#806050", paper: "#FFF8F5", stripe: "#F5DDD0",
    filterBg: "#FFF0E8"
  },
  {
    name: "像素沙漠",
    note: "参考图5 · GHOSH游戏风格 沙+蓝",
    bg: "#EDE5D0", ink: "#2A1F0A", accent: "#3A7FCC", accent2: "#8B4513",
    tan: "#C0A880", mid: "#7A6545", paper: "#F5EFE0", stripe: "#DDD5C0",
    filterBg: "#EDE5D0"
  },
  {
    name: "Onyx 暗金",
    note: "参考图6 · OS暗色主题 黑+金",
    bg: "#1A1A18", ink: "#F0EBD8", accent: "#D4A830", accent2: "#8A7040",
    tan: "#3A3830", mid: "#8A8070", paper: "#222220", stripe: "#2E2E2A",
    filterBg: "#1A1A18"
  },
  {
    name: "Scherzo 草绿",
    note: "参考图6 · OS Scherzo 粉彩绿+淡紫",
    bg: "#EFF5EE", ink: "#1A2A18", accent: "#5A9A4A", accent2: "#8A5ACC",
    tan: "#B8D8B0", mid: "#4A6A40", paper: "#F5FAF4", stripe: "#DFF0DC",
    filterBg: "#EFF5EE"
  },
  {
    name: "BeBox 柠黄",
    note: "参考图6 · OS BeBox 亮黄+蓝",
    bg: "#FFFBE0", ink: "#1A1500", accent: "#1A5ACC", accent2: "#CC8A00",
    tan: "#E0D898", mid: "#706040", paper: "#FFFFF0", stripe: "#F5F0C8",
    filterBg: "#FFFBE0"
  },
  {
    name: "像素深夜",
    note: "参考图7像素房间 深蓝色方案",
    bg: "#0F1829", ink: "#E0EEFF", accent: "#4A9FFF", accent2: "#3A7A5A",
    tan: "#1F2E45", mid: "#6080BB", paper: "#141E30", stripe: "#1A2438",
    filterBg: "#0F1829"
  },
  {
    name: "像素暖室",
    note: "参考图7像素房间 暖棕+金",
    bg: "#2A1A0A", ink: "#F5E8D0", accent: "#E8A030", accent2: "#8A5A20",
    tan: "#4A3020", mid: "#A88060", paper: "#351F0D", stripe: "#402815",
    filterBg: "#2A1A0A"
  },
  {
    name: "午夜稿纸",
    note: "自研 · 深蓝纸+月光白",
    bg: "#131C2E", ink: "#E8F0FF", accent: "#60B0FF", accent2: "#4A8A6A",
    tan: "#1E2E48", mid: "#6888BB", paper: "#182240", stripe: "#1C2A3A",
    filterBg: "#131C2E"
  },
  {
    name: "报纸头条",
    note: "自研 · 新闻纸+红色强调",
    bg: "#F5F0E0", ink: "#0A0A08", accent: "#CC2020", accent2: "#0A0A08",
    tan: "#C5BDA8", mid: "#555045", paper: "#FEFCF5", stripe: "#E8E4D0",
    filterBg: "#F5F0E0"
  },
  {
    name: "终端绿屏",
    note: "自研 · 黑屏+磷光绿 hacker",
    bg: "#080E08", ink: "#00FF41", accent: "#00CC33", accent2: "#009922",
    tan: "#0A2A0A", mid: "#3A8A3A", paper: "#0A120A", stripe: "#0D180D",
    filterBg: "#080E08"
  },
  {
    name: "蓝图纸",
    note: "自研 · 工程蓝图 深蓝+白线",
    bg: "#0A1830", ink: "#C8E0FF", accent: "#40C8FF", accent2: "#2080CC",
    tan: "#14305A", mid: "#5888CC", paper: "#0D2040", stripe: "#10264A",
    filterBg: "#0A1830"
  },
  {
    name: "海盐薄雾",
    note: "自研 · 淡蓝灰+青绿 清爽",
    bg: "#EFF4F5", ink: "#0A2025", accent: "#0A8080", accent2: "#205060",
    tan: "#A5C5CA", mid: "#408090", paper: "#F5FAFA", stripe: "#DDE8EA",
    filterBg: "#EFF4F5"
  },
  {
    name: "旧书房琥珀",
    note: "自研 · 书页黄+深褐+金",
    bg: "#EAE4D4", ink: "#1E1A12", accent: "#8B6010", accent2: "#4A3818",
    tan: "#C4B480", mid: "#6A5C38", paper: "#F2ECE0", stripe: "#DDD8C8",
    filterBg: "#EAE4D4"
  },
  {
    name: "珊瑚+青",
    note: "自研 · 珊瑚红+青蓝 游戏UI感",
    bg: "#FFF5F0", ink: "#1A0808", accent: "#E05838", accent2: "#2A8080",
    tan: "#F0C0B0", mid: "#806858", paper: "#FFF9F8", stripe: "#F5E0D8",
    filterBg: "#FFF5F0"
  },
  {
    name: "霓虹深夜",
    note: "自研 · 纯黑+热粉+青 赛博朋克",
    bg: "#080810", ink: "#F0F0FF", accent: "#FF0088", accent2: "#00CCFF",
    tan: "#1A1A2A", mid: "#6060A0", paper: "#0D0D18", stripe: "#101020",
    filterBg: "#080810"
  },
  {
    name: "薰衣草暗调",
    note: "自研 · 深紫+淡金 神秘感",
    bg: "#16101E", ink: "#EEE8FF", accent: "#B080FF", accent2: "#806840",
    tan: "#2A2038", mid: "#8878B0", paper: "#1C1428", stripe: "#201830",
    filterBg: "#16101E"
  },
  {
    name: "苔藓工厂",
    note: "自研 · 暗橄榄+锈橙 工业感",
    bg: "#1A1C10", ink: "#E8E0C0", accent: "#CC6820", accent2: "#6A8020",
    tan: "#2E3018", mid: "#8A8858", paper: "#20221A", stripe: "#262818",
    filterBg: "#1A1C10"
  },
];

const selected = new Set();

function renderScheme(s, i) {
  const isDark = isLight(s.bg) ? false : true;
  const labelBg = isDark ? '#111' : '#f0f0f0';
  const labelColor = isDark ? '#eee' : '#111';
  const swatchBorder = isDark ? 'rgba(255,255,255,.2)' : 'rgba(0,0,0,.15)';

  return `
  <div class="scheme" id="s${i}" onclick="toggle(${i})" style="background:${labelBg}">
    <div class="scheme-preview" style="background:${s.bg}">
      <!-- Nav -->
      <div class="p-nav" style="border-bottom:1.5px solid ${s.ink}">
        <span class="p-name" style="color:${s.ink}">ANNA TAN</span>
        <div class="p-links" style="color:${s.mid}">
          <span class="p-link">About</span>
          <span class="p-link">LinkedIn</span>
          <span class="p-link">itch.io</span>
        </div>
      </div>
      <!-- Filter -->
      <div class="p-filter" style="border-bottom-color:${s.tan}">
        <span class="p-fbtn active" style="color:${s.accent};border-bottom-color:${s.accent}">All</span>
        <span class="p-fbtn" style="color:${s.mid}">Game</span>
        <span class="p-fbtn" style="color:${s.mid}">Design Doc</span>
        <span class="p-fbtn" style="color:${s.mid}">Tool Dev</span>
      </div>
      <!-- Card -->
      <div class="p-card" style="background:${s.paper};border-color:${s.ink}">
        <div class="p-card-num" style="color:${s.accent}">01 ──────</div>
        <div class="p-card-title" style="color:${s.ink}">POPLIFE</div>
        <div class="p-card-desc" style="color:${s.mid}">2D Pixel Sim · Lead Designer · GDC 2026</div>
        <div class="p-card-tag" style="color:${s.mid};border-color:${s.tan};background:${s.bg}">Systems Design</div>
        <div class="p-card-tag" style="color:#fff;background:${s.accent2};border-color:${s.accent2};margin-left:2px">Featured</div>
      </div>
    </div>
    <div class="swatches" style="background:${labelBg}">
      <div class="swatch" style="background:${s.bg};border-color:${swatchBorder}"></div>
      <div class="swatch" style="background:${s.ink}"></div>
      <div class="swatch" style="background:${s.accent}"></div>
      <div class="swatch" style="background:${s.accent2}"></div>
      <div class="swatch" style="background:${s.mid}"></div>
      <div class="swatch" style="background:${s.paper}"></div>
    </div>
    <div class="scheme-label" style="background:${labelBg};color:${labelColor}">
      <div>
        <div style="font-size:0.72rem;font-weight:700">${s.name}</div>
        <div style="font-size:0.6rem;opacity:0.55;margin-top:1px">${s.note}</div>
      </div>
      <span class="scheme-num">${String(i+1).padStart(2,'0')}</span>
    </div>
  </div>`;
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114)/1000 > 128;
}

function toggle(i) {
  const el = document.getElementById('s'+i);
  if (selected.has(i)) {
    selected.delete(i);
    el.classList.remove('selected');
  } else {
    selected.add(i);
    el.classList.add('selected');
  }
  updateBar();
  // record for companion
  if (window.__companion) {
    const names = [...selected].map(j => schemes[j].name).join(', ');
    window.__companion.select([...selected].map(j=>String(j+1)).join(','), names);
  }
}

function updateBar() {
  const bar = document.getElementById('selbar');
  const txt = document.getElementById('seltext');
  if (selected.size === 0) {
    bar.classList.remove('show');
  } else {
    bar.classList.add('show');
    const names = [...selected].sort((a,b)=>a-b).map(i=>`${i+1}. ${schemes[i].name}`).join(' · ');
    txt.textContent = `已选 ${selected.size} 个: ${names}`;
  }
}

function confirm() {
  const names = [...selected].sort((a,b)=>a-b).map(i=>`${i+1}. ${schemes[i].name}`).join(', ');
  alert('选中: ' + names + '\n\n请在终端告诉我这几个，我来实施！');
}

document.getElementById('grid').innerHTML = schemes.map((s,i) => renderScheme(s,i)).join('');
</script>
<script src="/__companion/helper.js" onerror=""></script>
</body>
</html>
